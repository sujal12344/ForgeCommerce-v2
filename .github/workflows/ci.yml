name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Add these as repository secrets in GitHub → Settings → Secrets and variables → Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_DEMO_STORE_ID: ${{ secrets.NEXT_PUBLIC_DEMO_STORE_ID }}
          NEXT_PUBLIC_DEMO_STORE_URL: ${{ secrets.NEXT_PUBLIC_DEMO_STORE_URL }}
          NEXT_PUBLIC_DEMO_STORE_NAME: ${{ secrets.NEXT_PUBLIC_DEMO_STORE_NAME }}
          FRONTEND_STORE_URL: ${{ secrets.FRONTEND_STORE_URL }}
